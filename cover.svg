<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="200" cy="500" r="60" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 图标 -->
  <text x="600" y="200" font-size="120" text-anchor="middle" fill="white">🛒</text>
  
  <!-- 店名 -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white">Yuans Store</text>
  
  <!-- 副标题 -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.9)">Mosquito Control • Pet Supplies • Phone Accessories</text>
  
  <!-- 促销信息 -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ff6b6b">Up to 50% OFF</text>
  
  <!-- 底部信息 -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="rgba(255,255,255,0.7)">Fast Shipping Across Southeast Asia</text>
</svg>
